<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="BioZackTeam - Elite Fitness Coaching Platform" />
    <meta name="theme-color" content="#000000" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Support (iOS + standards) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BioZack" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>BioZackTeam Fitness</title>

    <!-- Set data-theme before React mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bzt-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker.
         CHANGED 2026-05-06: do NOT auto-skip-waiting on a new version.
         Auto-skip caused a "double login" regression: the new SW would
         activate mid-sign-in, fire controllerchange, reload the page,
         and wipe the half-completed auth attempt. The new behavior:
           1. The new SW installs in the background.
           2. It stays in "waiting" state until the user closes all tabs
              (or we explicitly post SKIP_WAITING from app code).
           3. Their NEXT clean visit picks up the new bundle.
         No reload listener — `controllerchange` is handled implicitly by
         the next page load. -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(function () { /* no-op */ });
        });
      }
    </script>
  </body>
</html>

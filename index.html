<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="BioZackTeam - Elite Fitness Coaching Platform" />
    <meta name="theme-color" content="#060814" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Support (iOS + standards) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BioZack" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>BioZackTeam Fitness</title>

    <!-- Set data-theme before React mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bzt-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker.
         When the SW updates (e.g. after a new deploy), `controllerchange` fires
         once the new worker takes control. We reload so the page picks up the
         new bundle instead of staying on the old cached one. -->
    <script>
      if ('serviceWorker' in navigator) {
        var reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function (reg) {
              // If a new SW becomes "waiting", tell it to skip waiting so it
              // activates immediately and triggers controllerchange.
              if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              reg.addEventListener('updatefound', function () {
                var nw = reg.installing;
                if (!nw) return;
                nw.addEventListener('statechange', function () {
                  if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                    nw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function () { /* no-op */ });
        });
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Browser tab favicon. Was pointing at /vite.svg (the default Vite
         starter mark) for too long — replaced with the real brand.
         The `?v=` query is a cache-bust: iOS Safari + Android Chrome
         cache apple-touch-icon / manifest icons VERY aggressively
         (often weeks). Bumping the version forces every device that
         visits to re-fetch the bytes even if the file path itself is
         unchanged. Bump this number whenever the icon PNGs are
         replaced — it's the single lever that propagates the change. -->
    <link rel="icon" type="image/png" href="/icon-192.png?v=4" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png?v=4" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="BioZackTeam - Elite Fitness Coaching Platform" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json?v=4" />

    <!-- PWA Support (iOS + standards). Multiple apple-touch-icon
         sizes so iOS picks the closest match for the user's device
         (iPhone uses 180, iPad uses 167/152). Without explicit sizes
         iOS falls back to a single 180 render and may upscale/blur
         on retina screens.
         Same ?v=4 cache-bust as the favicon block above. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BioZack" />
    <!-- /apple-touch-icon.png is the iOS-spec 180×180 size — iPhone's
         preferred apple-touch-icon. Listing it first (and as the
         unsized default) so iOS picks it over the 192 / 512 variants
         that exist for other surfaces. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png?v=4" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png?v=4" />

    <title>BioZackTeam Fitness</title>

    <!-- Set data-theme before React mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bzt-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker.
         CHANGED 2026-05-06: do NOT auto-skip-waiting on a new version.
         Auto-skip caused a "double login" regression: the new SW would
         activate mid-sign-in, fire controllerchange, reload the page,
         and wipe the half-completed auth attempt. The new behavior:
           1. The new SW installs in the background.
           2. It stays in "waiting" state until the user closes all tabs
              (or we explicitly post SKIP_WAITING from app code).
           3. Their NEXT clean visit picks up the new bundle.
         No reload listener — `controllerchange` is handled implicitly by
         the next page load. -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(function () { /* no-op */ });
        });
      }
    </script>
  </body>
</html>
